<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#eceff4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Michelangelo">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Michelangelo</title>
    <script>
        (function () {
            var t = localStorage.getItem('michelangelo_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = t === 'dark' ? '#2e3440' : '#eceff4';
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Nord palette (https://www.nordtheme.com/).
           --gold* keep their names for backwards-compat but now hold the Nord
           "Frost" accent (frost-blue on light, frost-cyan on dark). */
        :root, [data-theme="light"] {
            --bg: #eceff4;          /* nord6  - snow storm */
            --surface: #ffffff;
            --surface-2: #e5e9f0;   /* nord5 */
            --line: rgba(76, 86, 106, 0.16);
            --gold: #5e81ac;        /* nord10 - frost blue accent */
            --gold-dim: rgba(94, 129, 172, 0.4);
            --gold-soft: rgba(94, 129, 172, 0.12);
            --text: #2e3440;        /* nord0 */
            --muted: #4c566a;       /* nord3 */
            --dim: #9aa3b4;
            --error: #bf616a;       /* nord11 */
            --success: #5b7f4c;     /* nord14, darkened for light bg */
            --on-gold: #f7faff;     /* light text on the blue button */
            --glow: rgba(94, 129, 172, 0.10);
            --glow2: rgba(143, 188, 187, 0.08);
            --radius: 13px;
            --accent-grad: linear-gradient(135deg, #5e81ac 0%, #81a1c1 55%, #8fbcbb 100%);
            --accent-text-grad: linear-gradient(115deg, #5e81ac 0%, #6b8fbb 45%, #7ba8b0 100%);
            --shadow: 0 1px 2px rgba(46,52,64,.05), 0 6px 20px -8px rgba(46,52,64,.14);
            --shadow-strong: 0 10px 30px -10px rgba(94,129,172,.45), 0 2px 6px -2px rgba(94,129,172,.3);
            --edge: inset 0 1px 0 rgba(255,255,255,.65);
            --display: 'Space Grotesk', system-ui, sans-serif;
            --ui: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        [data-theme="dark"] {
            --bg: #2e3440;          /* nord0  - polar night */
            --surface: #3b4252;     /* nord1 */
            --surface-2: #434c5e;   /* nord2 */
            --line: rgba(136, 192, 208, 0.14);
            --gold: #88c0d0;        /* nord8  - frost cyan accent */
            --gold-dim: rgba(136, 192, 208, 0.38);
            --gold-soft: rgba(136, 192, 208, 0.15);
            --text: #eceff4;        /* nord6 */
            --muted: #8e99ad;
            --dim: #4c566a;         /* nord3 */
            --error: #bf616a;       /* nord11 */
            --success: #a3be8c;     /* nord14 */
            --on-gold: #1c2230;     /* dark text on the bright cyan button */
            --glow: rgba(136, 192, 208, 0.12);
            --glow2: rgba(129, 161, 193, 0.10);
            --accent-grad: linear-gradient(135deg, #8fbcbb 0%, #88c0d0 50%, #81a1c1 100%);
            --accent-text-grad: linear-gradient(115deg, #8fbcbb 0%, #88c0d0 50%, #9db8e0 100%);
            --shadow: 0 2px 4px rgba(0,0,0,.28), 0 10px 28px -10px rgba(0,0,0,.55);
            --shadow-strong: 0 12px 36px -10px rgba(136,192,208,.50), 0 2px 8px -2px rgba(136,192,208,.35);
            --edge: inset 0 1px 0 rgba(200,224,236,.10);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; }
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 100% 65% at 50% -10%, var(--glow), transparent 60%),
                radial-gradient(ellipse 75% 50% at 100% 0%, var(--glow2), transparent 55%),
                radial-gradient(ellipse 80% 55% at 0% 100%, var(--glow), transparent 55%);
            background-attachment: fixed;
            color: var(--text);
            font-family: var(--ui);
            -webkit-font-smoothing: antialiased;
            transition: background 0.25s, color 0.25s;
        }

        .shell {
            max-width: 26rem; margin: 0 auto;
            padding:
                max(1rem, env(safe-area-inset-top))
                max(1rem, env(safe-area-inset-right))
                max(1.5rem, env(safe-area-inset-bottom))
                max(1rem, env(safe-area-inset-left));
            min-height: 100dvh;
        }
        body.has-rest-timer .shell {
            padding-bottom: calc(7.5rem + env(safe-area-inset-bottom));
        }

        .display { font-family: var(--display); font-weight: 600; letter-spacing: -0.02em; }
        .label {
            font-size: 0.625rem; font-weight: 600; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--gold);
        }
        .muted { color: var(--muted); }
        .dim { color: var(--dim); }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow), var(--edge);
            padding: 1.25rem 1.15rem;
            margin-bottom: 0.85rem;
            position: relative;
            transition: background 0.25s, box-shadow 0.25s;
        }
        .panel-hero { overflow: hidden; }
        .panel-hero::before {
            content: ''; position: absolute; top: 0; left: 10%; right: 10%;
            height: 2px; border-radius: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 12px var(--gold-soft);
        }

        .back {
            background: none; border: none; color: var(--muted);
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; padding: 0.75rem 0; margin-bottom: 0.75rem;
            cursor: pointer; min-height: 44px; touch-action: manipulation;
        }
        .back:active { color: var(--gold); }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; min-height: 50px; padding: 0.85rem 1rem;
            background: var(--accent-grad); color: var(--on-gold);
            border: none; border-radius: 11px; font-family: var(--ui); font-size: 0.7rem;
            font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
            box-shadow: var(--shadow-strong);
            cursor: pointer; transition: box-shadow 0.2s, transform 0.1s, filter 0.15s;
            touch-action: manipulation;
        }
        .btn:active { transform: translateY(1px) scale(0.995); filter: brightness(1.06); box-shadow: 0 5px 16px -8px rgba(94,129,172,.5); }
        .btn:disabled { opacity: 0.4; box-shadow: none; filter: grayscale(0.3); pointer-events: none; }

        .btn-ghost {
            background: transparent; color: var(--gold);
            border: 1px solid var(--gold-dim); border-radius: 11px;
            min-height: 48px; padding: 0.7rem 1rem; font-size: 0.65rem; font-weight: 600;
            letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            touch-action: manipulation;
        }
        .btn-ghost:active { background: var(--gold-soft); border-color: var(--gold); }

        .btn-github {
            display: flex; align-items: center; justify-content: center; gap: 0.65rem;
            width: 100%; min-height: 50px; padding: 0.9rem;
            background: var(--surface-2); color: var(--text);
            border: 1px solid var(--line); border-radius: 11px;
            box-shadow: var(--shadow);
            font-size: 0.78rem; font-weight: 600; cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .btn-github:active { border-color: var(--gold-dim); box-shadow: var(--shadow-strong); }

        .btn-set {
            min-width: 44px; min-height: 44px; border-radius: 9px;
            background: var(--surface-2); color: var(--dim);
            border: 1px solid var(--line); font-family: var(--mono);
            font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
            touch-action: manipulation;
        }
        .btn-set.done { background: var(--accent-grad); color: var(--on-gold); border-color: transparent; box-shadow: 0 4px 12px -4px var(--gold-dim); }

        .input {
            width: 100%; background: var(--surface-2); color: var(--text);
            border: none; border-bottom: 1px solid var(--line);
            padding: 0.85rem 0.75rem; font-size: 16px; font-family: var(--ui);
            min-height: 48px; transition: border-color 0.15s, background 0.25s;
            -webkit-appearance: none; border-radius: 0;
        }
        .input:focus { outline: none; border-bottom-color: var(--gold); }
        .input::placeholder { color: var(--dim); }
        .input-sm {
            text-align: center; padding: 0.6rem 0.35rem; min-height: 44px;
            font-family: var(--mono); font-size: 0.9rem;
        }
        textarea.input { resize: vertical; min-height: 4.5rem; }

        .check {
            display: flex; align-items: flex-start; gap: 0.85rem;
            padding: 0.85rem 0; border-bottom: 1px solid var(--line); cursor: pointer;
            min-height: 44px; touch-action: manipulation;
        }
        .check:last-of-type { border-bottom: none; }
        .check input {
            width: 1.25rem; height: 1.25rem; margin-top: 0.1rem;
            accent-color: var(--gold); flex-shrink: 0;
        }
        .check-title { font-size: 0.85rem; font-weight: 600; color: var(--text); display: block; }
        .check-sub { font-size: 0.7rem; color: var(--muted); line-height: 1.5; margin-top: 0.2rem; display: block; }

        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .week-nav button {
            background: none; border: none; color: var(--muted);
            font-size: 1.5rem; min-width: 44px; min-height: 44px;
            cursor: pointer; touch-action: manipulation;
            display: flex; align-items: center; justify-content: center;
        }
        .week-nav button:active { color: var(--gold); }

        .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; margin-bottom: 1.25rem; }
        .day {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.3rem; min-height: 58px; padding: 0.5rem 0.15rem;
            background: transparent; border: none; border-radius: 10px; cursor: pointer;
            transition: background 0.15s; touch-action: manipulation;
        }
        .day:active { background: var(--surface-2); }
        .day.is-today { background: var(--gold-soft); }
        .day-letter { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; }
        .day-code {
            font-family: var(--display); font-size: 1.15rem; font-weight: 600;
            color: var(--muted); line-height: 1;
        }
        .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); }
        .day.is-today .day-code { color: var(--gold); }
        .day.is-today .day-dot { background: var(--gold); box-shadow: 0 0 6px var(--gold-soft); }
        .day.is-done .day-dot { background: var(--success); }
        .day.is-done .day-code { color: var(--text); }

        .pillar { margin-bottom: 0.85rem; }
        .pillar:last-child { margin-bottom: 0; }
        .pillar-head { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
        .pillar-track { height: 3px; background: var(--surface-2); overflow: hidden; border-radius: 3px; }
        .pillar-fill { height: 100%; background: var(--accent-grad); border-radius: 3px; box-shadow: 0 0 8px var(--gold-dim); transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

        .exercise { padding-bottom: 1.15rem; margin-bottom: 1.15rem; border-bottom: 1px solid var(--line); }
        .exercise:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .exercise-head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.75rem; }
        .exercise-name { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; flex: 1; }
        .exercise-meta { font-family: var(--mono); font-size: 0.6rem; color: var(--gold); flex-shrink: 0; }

        .set-grid { display: grid; grid-template-columns: 2.25rem 1fr 1fr 2.75rem; gap: 0.35rem; align-items: center; margin-bottom: 0.45rem; }
        .set-num { font-family: var(--mono); font-size: 0.6rem; color: var(--dim); text-align: center; }
        .ghost-hint { font-size: 0.6rem; color: var(--dim); font-style: italic; margin-bottom: 0.5rem; }

        .timer {
            font-family: var(--mono); font-size: clamp(2.75rem, 14vw, 4.5rem);
            font-weight: 500; letter-spacing: -0.04em; color: var(--text); line-height: 1;
        }

        .phase-track { display: flex; gap: 3px; margin-top: 1rem; }
        .phase-seg { flex: 1; height: 3px; border-radius: 3px; background: var(--surface-2); transition: background 0.3s; }
        .phase-seg.done { background: var(--accent-grad); box-shadow: 0 0 6px var(--gold-dim); }
        .phase-seg.active { background: var(--gold-soft); box-shadow: 0 0 6px var(--gold-soft); }

        .overview-row {
            display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem;
            padding: 0.6rem 0; border-bottom: 1px solid var(--line); font-size: 0.8rem;
        }
        .overview-row:last-child { border-bottom: none; }
        .overview-time { font-family: var(--mono); font-size: 0.65rem; color: var(--gold); flex-shrink: 0; }

        .rpe-row { display: flex; align-items: center; gap: 0.75rem; margin: 0.75rem 0; min-height: 44px; }
        .rpe-val { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; color: var(--gold); width: 1.5rem; text-align: center; }
        input[type="range"] { accent-color: var(--gold); height: 4px; flex: 1; min-height: 44px; }

        .rest-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            background: var(--surface); border-top: 1px solid var(--line);
            padding: 1rem 1.15rem max(1rem, env(safe-area-inset-bottom));
            max-width: 26rem; margin: 0 auto;
            transition: background 0.25s;
        }
        .rest-bar.done { border-top-color: var(--gold); }
        .rest-bar .timer { font-size: clamp(2rem, 10vw, 2.75rem); }
        .rest-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .rest-actions button {
            background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
            min-height: 44px; padding: 0.5rem 0.85rem; font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
            touch-action: manipulation;
        }
        .rest-actions button:last-child { color: var(--gold); border-color: var(--gold-dim); }

        .sync-status { text-align: center; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 0.75rem; min-height: 1rem; color: var(--muted); }
        .sync-ok { color: var(--success); }
        .sync-warn { color: var(--gold); }

        .status-error { color: var(--error); font-size: 0.75rem; font-weight: 600; text-align: center; margin-bottom: 1rem; }
        .loading-pulse { color: var(--gold); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; animation: pulse 2s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; margin-bottom: 1.75rem; }
        .header-title {
            font-family: var(--display); font-size: clamp(1.5rem, 6vw, 1.85rem); font-weight: 600;
            letter-spacing: -0.01em; margin: 0; line-height: 1.1;
            background: var(--accent-text-grad);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }
        .header-date { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 0.35rem; }
        .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 0.35rem; flex-shrink: 0; }
        .header-row { display: flex; align-items: center; gap: 0.5rem; }
        .sign-out, .theme-toggle {
            background: none; border: none; color: var(--dim);
            font-size: 0.6rem; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; cursor: pointer; min-height: 36px;
            padding: 0.25rem 0.35rem; touch-action: manipulation;
        }
        .theme-toggle { color: var(--gold); }
        .sign-out:active, .theme-toggle:active { opacity: 0.7; }
        .avatar { width: 1.75rem; height: 1.75rem; border-radius: 50%; opacity: 0.85; }

        .list-item { font-size: 0.85rem; color: var(--muted); padding: 0.55rem 0; border-bottom: 1px solid var(--line); }
        .list-item:last-child { border-bottom: none; }
        .list-item strong { color: var(--text); font-weight: 500; }

        .hidden { display: none !important; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .gap-3 { gap: 0.75rem; }
        .flex-1 { flex: 1; min-width: 0; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }

        .prog-banner {
            background: var(--gold-soft); padding: 0.85rem 1rem; margin-bottom: 1rem;
            border-left: 2px solid var(--gold);
        }
        .prog-banner-title { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.25rem; }
        .prog-banner-sub { font-size: 0.75rem; color: var(--muted); }

        .prog-target {
            display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem;
            padding: 0.5rem 0 0.65rem; margin-bottom: 0.5rem;
            border-bottom: 1px dashed var(--line);
        }
        .prog-target-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); flex-shrink: 0; }
        .prog-target-detail { font-size: 0.65rem; color: var(--muted); text-align: right; }

        .set-grid.is-pr .set-num { color: var(--gold); font-weight: 700; }
        .set-grid.is-pr .btn-set.done { box-shadow: 0 0 0 1px var(--gold); }

        .pr-list { margin: 0.75rem 0 1rem; }
        .pr-item {
            font-size: 0.75rem; padding: 0.45rem 0; border-bottom: 1px solid var(--line);
            color: var(--text);
        }
        .pr-item:last-child { border-bottom: none; }
        .pr-item strong { color: var(--gold); font-weight: 600; }

        .advice-list { margin-bottom: 1rem; }
        .advice-item { font-size: 0.7rem; color: var(--muted); padding: 0.35rem 0; }
        .advice-item span { color: var(--gold); font-weight: 600; }

        .install-banner { margin-bottom: 1rem; }
        .install-row { display: flex; flex-direction: column; gap: 0.75rem; }
        .install-copy { font-size: 0.75rem; color: var(--muted); margin: 0; }
        .install-actions { display: flex; gap: 0.5rem; align-items: center; }
        .install-btn { width: auto; padding: 0.55rem 1rem; min-height: 44px; flex-shrink: 0; }

        @media (max-width: 360px) {
            .set-grid { grid-template-columns: 1.75rem 1fr 1fr 2.5rem; gap: 0.25rem; }
            .header-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="shell" id="app">
        <div class="panel text-center" style="margin-top: 5rem;">
            <p class="loading-pulse">Loading</p>
        </div>
    </div>
    <script>
        // Safety net: if the main module fails to load (e.g. CDN blocked by adblocker, network, or file:// protocol),
        // the pulsing "Loading" would stay forever. Surface a hint after a few seconds.
        setTimeout(() => {
            const shell = document.getElementById('app');
            if (shell && shell.querySelector('.loading-pulse')) {
                const hint = document.createElement('div');
                hint.style.cssText = 'margin-top:1rem;font-size:0.65rem;color:#4c566a;text-align:center;line-height:1.4';
                hint.innerHTML = 'Still loading? Open DevTools (F12) → Console/Network.<br>Common causes: ad blocker blocking cdn.jsdelivr.net, corporate firewall, or opening index.html directly (use a local server).';
                shell.querySelector('.panel').appendChild(hint);
            }
        }, 4500);
    </script>
    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            // Reload exactly once when a new service worker takes control, so the
            // freshly-activated worker serves the new app code. Guarded against loops.
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                console.log('[Michelangelo] New app version active. Reloading...');
                window.location.reload();
            });

            navigator.serviceWorker.register('./sw.js', { scope: './' }).then((registration) => {
                // Proactively check for updates
                registration.update();

                // If a worker is already waiting, ask it to take over now.
                if (registration.waiting) {
                    registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }

                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', () => {
                        // Only prompt activation when there's already a controller (i.e. an
                        // update, not the first install). controllerchange then reloads us.
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('[Michelangelo] New app version installed. Activating...');
                            newWorker.postMessage({ type: 'SKIP_WAITING' });
                        }
                    });
                });
            }).catch(function () {});
        }
    </script>
</body>
</html>
